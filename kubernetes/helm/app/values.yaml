service:
  name: app-service
  type: LoadBalancer
  app: app-devops-project
  port: 8080
  targetPort: 8080
  nodePort: 31200

app:
  name: app-devops-project
  replicas: 2
  type: RollingUpdate
  maxSurge: 1
  maxUnavailable: 1
  image: andreichenko/cdp-project:latest
  imagePullPolicy: Always
  containerPort: 8080